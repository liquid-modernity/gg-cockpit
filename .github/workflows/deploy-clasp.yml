name: Push Apps Script

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps-script/**'
      - 'qa/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-clasp.yml'

concurrency:
  group: apps-script-push
  cancel-in-progress: false

jobs:
  push-apps-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install project dependencies
        run: npm ci

      - name: Run QA gates
        run: npm run qa

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: |
          printf '%s' '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json
          test -s ~/.clasprc.json

      - name: Write clasp project config
        run: |
          printf '%s' '${{ secrets.CLASP_JSON }}' > .clasp.json
          test -s .clasp.json

      - name: Verify clasp rootDir
        run: node -e "const config = require('./.clasp.json'); if (config.rootDir !== 'apps-script') { throw new Error('CLASP_JSON rootDir must be apps-script'); }"

      - name: Push code to Apps Script
        run: clasp push --force
